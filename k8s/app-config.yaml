apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: buildmaterials
data:
  POSTGRES_HOST: "postgres-service.buildmaterials.svc.cluster.local"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "buildmat_db"
  REDIS_HOST: "redis-service.buildmaterials.svc.cluster.local"
  REDIS_PORT: "6379"
  DJANGO_DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1,app.local"
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secret
  namespace: buildmaterials
type: Opaque
stringData:
  POSTGRES_USER: "admin"
  POSTGRES_PASSWORD: "securepassword123"
  SECRET_KEY: "change-this-to-a-random-secret-key-in-production"
