apiVersion: batch/v1
kind: Job
metadata:
  name: import-data-job
spec:
  template:
    spec:
      containers:
      - name: import-data
        image: stroymaterials-django:latest
        command: ["python", "manage.py", "import_data"]
        envFrom:
        - configMapRef:
            name: stroymaterials-config
        - secretRef:
            name: stroymaterials-secrets
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
      restartPolicy: OnFailure
  backoffLimit: 3
