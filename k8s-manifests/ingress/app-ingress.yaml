apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: buildmaterials-ingress
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/ssl-redirect: "false"
spec:
  ingressClassName: nginx
  rules:
  - host: buildmaterials.local
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: nginx-service
            port:
              number: 80
  # В продакшене добавьте TLS конфигурацию
  # tls:
  # - hosts:
  #   - buildmaterials.local
  #   secretName: buildmaterials-tls
