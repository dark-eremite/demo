apiVersion: v1
kind: ConfigMap
metadata:
  name: stroymaterials-config
data:
  # PostgreSQL настройки
  POSTGRES_DB: "stroymaterials_db"
  POSTGRES_USER: "stroymaterials_user"
  
  # Redis настройки
  REDIS_HOST: "redis-service"
  REDIS_PORT: "6379"
  
  # Django настройки
  DJANGO_SETTINGS_MODULE: "config.settings"
  PYTHONUNBUFFERED: "1"
  DEBUG: "False"
  ALLOWED_HOSTS: "localhost,127.0.0.1,stroymaterials.local"
