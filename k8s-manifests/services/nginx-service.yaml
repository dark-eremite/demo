apiVersion: v1
kind: Service
metadata:
  name: nginx-service
spec:
  selector:
    app: nginx
  ports:
  - protocol: TCP
    port: 80
    targetPort: http-port
  type: LoadBalancer
  # LoadBalancer открывает доступ извне (в облачных провайдерах)
  # Для локальной разработки можно использовать NodePort или Ingress
