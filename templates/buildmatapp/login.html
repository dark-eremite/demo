{% extends "base.html" %}

{% block title %}Вход - СтройМатериалы{% endblock %}

{% block content %}
<div class="card" style="max-width: 400px; margin: 50px auto;">
    <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">Вход в систему</h2>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="post" id="loginForm">
        {% csrf_token %}

        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" placeholder="Введите логин" autocomplete="username">
        </div>

        <div class="form-group">
            <label for="password">Пароль</label>
            <div style="position: relative;">
                <input type="password" id="password" name="password" placeholder="Введите пароль" autocomplete="current-password" style="padding-right: 40px;">
                <button type="button" id="togglePassword" style="position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; font-size: 18px;">👁</button>
            </div>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn" id="loginBtn" disabled>Войти</button>
            <a href="{% url 'buildmatapp:product_list' %}" class="btn btn-secondary">Гостевой вход</a>
        </div>
    </form>

    <p style="text-align: center; margin-top: 20px;">
        Нет аккаунта? <a href="{% url 'buildmatapp:register' %}">Зарегистрироваться</a>
    </p>
</div>

<script>
    const usernameInput = document.getElementById('username');
    const passwordInput = document.getElementById('password');
    const loginBtn = document.getElementById('loginBtn');
    const togglePassword = document.getElementById('togglePassword');

    function checkFields() {
        loginBtn.disabled = !(usernameInput.value.trim() !== '' && passwordInput.value.trim() !== '');
    }

    usernameInput.addEventListener('input', checkFields);
    passwordInput.addEventListener('input', checkFields);

    togglePassword.addEventListener('click', function() {
        const type = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = type;
        this.textContent = type === 'password' ? '👁' : '🙈';
    });

    document.getElementById('loginForm').addEventListener('submit', function() {
        loginBtn.disabled = true;
    });
</script>
{% endblock %}
