{% extends "base.html" %}

{% block title %}Регистрация - СтройМатериалы{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 30px auto;">
    <h2 style="text-align: center; margin-bottom: 20px; color: #2c3e50;">Регистрация</h2>

    {% if error %}
        <div class="error-message">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="form-group">
            <label for="first_name">Имя</label>
            <input type="text" id="first_name" name="first_name" required>
        </div>

        <div class="form-group">
            <label for="last_name">Фамилия</label>
            <input type="text" id="last_name" name="last_name" required>
        </div>

        <div class="form-group">
            <label for="username">Логин</label>
            <input type="text" id="username" name="username" required>
        </div>

        <div class="form-group">
            <label for="password1">Пароль</label>
            <input type="password" id="password1" name="password1" required>
        </div>

        <div class="form-group">
            <label for="password2">Повторите пароль</label>
            <input type="password" id="password2" name="password2" required>
        </div>

        <div class="form-actions">
            <button type="submit" class="btn">Зарегистрироваться</button>
            <a href="{% url 'buildmatapp:login' %}" class="btn btn-secondary">Уже есть аккаунт</a>
        </div>
    </form>
</div>
{% endblock %}
